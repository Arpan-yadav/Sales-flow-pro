# Disable web server for Swing GUI
spring.main.web-application-type=none
spring.main.headless=false
spring.application.name=sales-management-swing

# ─────────────────────────────────────────────
# PostgreSQL DataSource
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/sales_db
spring.datasource.username=postgres
spring.datasource.password=@Apy18748
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true



# ─────────────────────────────────────────────
# File Storage (invoice PDFs)
# ─────────────────────────────────────────────
app.storage.invoice-dir=invoices/

# ─────────────────────────────────────────────
# Mail (Gmail SMTP — update credentials)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.sales=INFO
logging.level.org.springframework.security=WARN
