# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080
spring.application.name=sales-management-system

# ─────────────────────────────────────────────
# PostgreSQL DataSource
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/sales_db
spring.datasource.username=postgres
spring.datasource.password=@Apy18748
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration-ms=86400000

# ─────────────────────────────────────────────
# File Storage (invoice PDFs)
# ─────────────────────────────────────────────
app.storage.invoice-dir=invoices/

# ─────────────────────────────────────────────
# Mail (Gmail SMTP — update credentials)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────
# Multipart (CSV upload)
# ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.sales=INFO
logging.level.org.springframework.security=WARN
